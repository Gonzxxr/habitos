<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hábitos">
<title>Bitácora de Hábitos</title>
<style>
  :root{
    --bg: #14171C;
    --panel: #1C2027;
    --panel-2: #22262F;
    --line: #2C313B;
    --text: #E7E5DF;
    --muted: #8B92A0;
    --amber: #E8A33D;
    --teal: #3DDC97;
    --red: #E15B5B;
    --font-display: 'JetBrains Mono', 'Space Mono', monospace;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    padding: 32px 16px 80px;
    min-height:100vh;
  }

  .wrap{
    max-width: 780px;
    margin: 0 auto;
  }

  header{
    display:flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 18px;
  }

  header h1{
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: 0.5px;
    margin: 0 0 4px;
    color: var(--text);
  }

  header .sub{
    font-size: 13px;
    color: var(--muted);
  }

  header .date{
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--amber);
    text-align: right;
    text-transform: capitalize;
  }

  .overview{
    display:flex;
    gap:12px;
    margin-bottom: 28px;
  }

  .stat{
    flex:1;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .stat .num{
    font-family: var(--font-display);
    font-size: 26px;
    color: var(--amber);
    line-height: 1;
  }

  .stat .label{
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .section-label{
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 0 0 12px 2px;
  }

  .habit{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px 18px 16px;
    margin-bottom: 14px;
  }

  .habit-top{
    display:flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .habit-name{
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 4px;
  }

  .habit-tag{
    display:inline-block;
    font-family: var(--font-display);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--panel-2);
    color: var(--amber);
    border: 1px solid var(--line);
    margin-bottom: 8px;
  }

  .habit-trigger{
    font-size: 13px;
    color: var(--muted);
    margin: 0;
    line-height: 1.5;
  }

  .habit-trigger b{
    color: var(--text);
    font-weight: 500;
  }

  .habit-actions{
    display:flex;
    gap:8px;
    align-items:center;
    flex-shrink:0;
  }

  .check-btn{
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--line);
    background: transparent;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s ease;
    flex-shrink:0;
  }

  .check-btn:hover{
    border-color: var(--teal);
    color: var(--teal);
  }

  .check-btn.done{
    background: var(--teal);
    border-color: var(--teal);
    color: var(--bg);
  }

  .icon-btn{
    background: none;
    border: none;
    color: var(--muted);
    font-size: 15px;
    cursor: pointer;
    padding: 4px 6px;
    line-height:1;
  }
  .icon-btn:hover{ color: var(--red); }

  .strip{
    display:flex;
    gap: 5px;
    margin-top: 14px;
  }

  .led{
    flex:1;
    height: 8px;
    border-radius: 2px;
    background: var(--panel-2);
    border: 1px solid var(--line);
  }
  .led.on{
    background: var(--amber);
    border-color: var(--amber);
    box-shadow: 0 0 6px rgba(232,163,61,0.5);
  }
  .led.today{
    outline: 1px dashed var(--muted);
    outline-offset: 2px;
  }

  .streak-row{
    display:flex;
    justify-content: space-between;
    align-items:center;
    margin-top: 10px;
  }

  .streak{
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--muted);
  }
  .streak b{ color: var(--amber); }

  .weekday-labels{
    display:flex;
    gap:5px;
    margin-top: 4px;
  }
  .weekday-labels span{
    flex:1;
    text-align:center;
    font-size: 9px;
    color: var(--muted);
    opacity: 0.6;
  }

  .add-form{
    background: var(--panel);
    border: 1px dashed var(--line);
    border-radius: 12px;
    padding: 18px;
    margin-top: 24px;
  }

  .add-form h3{
    font-family: var(--font-display);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin: 0 0 14px;
  }

  .field{
    margin-bottom: 12px;
  }

  .field label{
    display:block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .field input, .field select{
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 7px;
    font-family: var(--font-body);
    font-size: 13px;
  }

  .field input:focus, .field select:focus{
    outline: none;
    border-color: var(--amber);
  }

  .trigger-hint{
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.4;
  }

  .submit-btn{
    background: var(--amber);
    color: var(--bg);
    border: none;
    padding: 11px 20px;
    border-radius: 7px;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    width: 100%;
    margin-top: 4px;
  }
  .submit-btn:hover{ opacity: 0.9; }

  .empty{
    text-align:center;
    color: var(--muted);
    font-size: 13px;
    padding: 30px 0;
  }

  footer{
    text-align:center;
    color: var(--muted);
    font-size: 11px;
    margin-top: 40px;
    opacity: 0.5;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <h1>BITÁCORA DE HÁBITOS</h1>
      <div class="sub">Disparador → acción. Sin depender de las ganas.</div>
    </div>
    <div class="date" id="today-label"></div>
  </header>

  <div class="overview">
    <div class="stat">
      <div class="num" id="stat-done">0/0</div>
      <div class="label">Hoy</div>
    </div>
    <div class="stat">
      <div class="num" id="stat-streak">0</div>
      <div class="label">Mejor racha activa</div>
    </div>
    <div class="stat">
      <div class="num" id="stat-total">0</div>
      <div class="label">Hábitos activos</div>
    </div>
  </div>

  <div class="section-label">Módulos</div>
  <div id="habit-list"></div>

  <div class="add-form">
    <h3>+ Nuevo hábito</h3>
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="input-name" placeholder="Ej: Rutina de piel">
    </div>
    <div class="field">
      <label>Área</label>
      <select id="input-area">
        <option value="Estudio">Estudio</option>
        <option value="Gym">Gym</option>
        <option value="Piel">Piel</option>
        <option value="Orden">Orden</option>
        <option value="Otro">Otro</option>
      </select>
    </div>
    <div class="field">
      <label>Disparador (si... entonces...)</label>
      <input type="text" id="input-trigger" placeholder="Ej: Después de bañarme, hago la rutina">
      <div class="trigger-hint">Enganchá el hábito nuevo a algo que ya hacés todos los días a hora fija.</div>
    </div>
    <button class="submit-btn" onclick="addHabit()">Agregar hábito</button>
  </div>

  <footer>Los datos se guardan solo en este navegador.</footer>
</div>

<script>
const STORAGE_KEY = 'bitacora-habitos-v1';
const DIAS = ['L','M','X','J','V','S','D'];

function todayISO(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return seedDefaults();
    return JSON.parse(raw);
  }catch(e){
    return seedDefaults();
  }
}

function save(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function seedDefaults(){
  return {
    habits: [
      { id: cryptoId(), name: 'Estudiar', area: 'Estudio', trigger: 'A las 19:00, abro el apunte 20 minutos', history: {} },
      { id: cryptoId(), name: 'Ejercicio', area: 'Gym', trigger: 'Al llegar de la facultad, 15 minutos', history: {} },
      { id: cryptoId(), name: 'Rutina de piel', area: 'Piel', trigger: 'Después de bañarme', history: {} },
      { id: cryptoId(), name: 'Ordenar escritorio', area: 'Orden', trigger: 'Antes de dormir, 5 minutos', history: {} }
    ]
  };
}

function cryptoId(){
  return Math.random().toString(36).slice(2, 10);
}

let state = load();

function getLast7Dates(){
  const dates = [];
  const d = new Date();
  for(let i=6; i>=0; i--){
    const dt = new Date(d);
    dt.setDate(d.getDate()-i);
    dates.push(dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0'));
  }
  return dates;
}

function computeStreak(history){
  let streak = 0;
  const d = new Date();
  // if today not done yet, start counting from yesterday
  let cursor = new Date(d);
  if(!history[todayISO()]){
    cursor.setDate(cursor.getDate()-1);
  }
  while(true){
    const iso = cursor.getFullYear() + '-' + String(cursor.getMonth()+1).padStart(2,'0') + '-' + String(cursor.getDate()).padStart(2,'0');
    if(history[iso]){
      streak++;
      cursor.setDate(cursor.getDate()-1);
    }else{
      break;
    }
  }
  return streak;
}

function render(){
  const list = document.getElementById('habit-list');
  const today = todayISO();
  const last7 = getLast7Dates();

  document.getElementById('today-label').textContent = new Date().toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });

  if(state.habits.length === 0){
    list.innerHTML = '<div class="empty">No tenés hábitos cargados todavía. Agregá uno abajo.</div>';
  } else {
    list.innerHTML = state.habits.map(h => {
      const doneToday = !!h.history[today];
      const streak = computeStreak(h.history);
      const ledsHtml = last7.map(iso => {
        const on = h.history[iso] ? 'on' : '';
        const isToday = iso === today ? 'today' : '';
        return `<div class="led ${on} ${isToday}"></div>`;
      }).join('');

      return `
        <div class="habit">
          <div class="habit-top">
            <div>
              <div class="habit-tag">${h.area}</div>
              <div class="habit-name">${escapeHtml(h.name)}</div>
              <p class="habit-trigger">${escapeHtml(h.trigger)}</p>
            </div>
            <div class="habit-actions">
              <button class="icon-btn" onclick="deleteHabit('${h.id}')" title="Eliminar">✕</button>
              <button class="check-btn ${doneToday ? 'done' : ''}" onclick="toggleToday('${h.id}')" title="Marcar hecho hoy">${doneToday ? '✓' : ''}</button>
            </div>
          </div>
          <div class="strip">${ledsHtml}</div>
          <div class="weekday-labels">${last7.map(iso => {
            const dow = new Date(iso + 'T00:00:00').getDay(); // 0=Sun
            const idx = dow === 0 ? 6 : dow - 1;
            return `<span>${DIAS[idx]}</span>`;
          }).join('')}</div>
          <div class="streak-row">
            <div class="streak">Racha: <b>${streak}</b> día${streak === 1 ? '' : 's'}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  // stats
  const totalHabits = state.habits.length;
  const doneCount = state.habits.filter(h => h.history[today]).length;
  const bestStreak = state.habits.reduce((max, h) => Math.max(max, computeStreak(h.history)), 0);

  document.getElementById('stat-done').textContent = `${doneCount}/${totalHabits}`;
  document.getElementById('stat-streak').textContent = bestStreak;
  document.getElementById('stat-total').textContent = totalHabits;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function toggleToday(id){
  const h = state.habits.find(x => x.id === id);
  if(!h) return;
  const today = todayISO();
  if(h.history[today]){
    delete h.history[today];
  } else {
    h.history[today] = true;
  }
  save(state);
  render();
}

function deleteHabit(id){
  if(!confirm('¿Eliminar este hábito y su historial?')) return;
  state.habits = state.habits.filter(x => x.id !== id);
  save(state);
  render();
}

function addHabit(){
  const name = document.getElementById('input-name').value.trim();
  const area = document.getElementById('input-area').value;
  const trigger = document.getElementById('input-trigger').value.trim();

  if(!name || !trigger){
    alert('Completá el nombre y el disparador.');
    return;
  }

  state.habits.push({
    id: cryptoId(),
    name,
    area,
    trigger,
    history: {}
  });

  save(state);
  document.getElementById('input-name').value = '';
  document.getElementById('input-trigger').value = '';
  render();
}

render();
</script>

</body>
</html>
